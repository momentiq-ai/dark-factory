# PR Status Check — reusable workflow shape (cycle 331.1 Phase E).
#
# This is the no-op aggregator gate. It satisfies the `PR Status Check`
# required-status-check context in dark-factory's own main1 ruleset
# (id 16808560) and is published as a reusable workflow for consumers
# (sage3c / cerebe-platform / external repos) to invoke from their own
# CI in Phases G/H.
#
# Dual trigger:
#   1. `pull_request:` — runs on dark-factory's own PRs so the ruleset
#      is satisfied here (the context emitted is the JOB NAME below).
#   2. `workflow_call:` — consumers `uses:` this file from their own
#      workflows. For consumers, the emitted context is
#      `<consumer-caller-job-id> / <callee-job-name>`. The consumer
#      MUST name their caller job exactly `pr-status-check:` (or
#      whatever matches their ruleset) so the rule matches.
#
# Phase E posture: this is a pure aggregator stub that exits 0. There is
# no real "PR status" logic to add — by design, this gate is a sentinel
# that other workflows can satisfy by being green. Real aggregator logic
# (if ever needed) lands in Phase F.
#
# Consumer pinning (Phase G/H):
#   uses: momentiq-ai/dark-factory/.github/workflows/pr-status-check.yml@v0.1.0
#
# Versioning: per cycle 331.1 § Versioning policy, only exact `@vX.Y.Z`
# tags are supported. Floating `@v0` / `@v0.1` tags are NOT created so
# consumers cannot accidentally pin to a moving target.
#
# Phase B-PUBLISH-wf (cycle 331.1): the `cli-version != 'local'` branch
# below installs the pinned CLI from npm under @momentiq scope using a
# job-scoped `.npmrc` (mktemp + trap + chmod 600, written to
# $RUNNER_TEMP so the token never lands in the consumer's checkout).
# `--ignore-scripts` blocks lifecycle scripts. The full integrity-baked
# `npm pack` + extract-to-trusted-tmpdir hardening from cycle 331.1
# § "Reusable workflow shapes" (lines ~240-470) is deferred to a
# follow-up because the published 0.1.0-alpha.5 artifact still declares
# runtime `dependencies` (not yet a fully-bundled artifact) and no
# `EXPECTED_INTEGRITY` is baked at workflow-tag time. That hardening
# lands alongside (a) re-publishing the CLI as fully-bundled and (b)
# the Phase E release-CI guard that bakes the integrity hash at tag
# time.
#
# Security: this workflow takes no user-controllable string inputs that
# get interpolated into shell. The single input (`cli-version`) is read
# into an env var (REQUESTED_VERSION) before any run script references
# it, per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

name: PR Status Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_call:
    inputs:
      cli-version:
        description: |
          CLI version to install. 'local' (default) builds from the
          checked-out workspace — only valid when invoked from within
          dark-factory itself. Consumers in Phase G/H pass an explicit
          semver tag (e.g. '0.1.0-alpha.5'); the install step uses
          `npm install @momentiq/dark-factory-cli@<version>` inside an
          isolated $RUNNER_TEMP dir with a job-scoped .npmrc.
        type: string
        required: false
        default: 'local'
    secrets:
      MOMENTIQ_NPM_READ_TOKEN:
        description: |
          Read-token for the @momentiq npm scope (private 331.1/331.2
          window). Required when `cli-version` != 'local'. Becomes
          optional post-331.3 OSS-flip.
        required: false

permissions:
  contents: read

concurrency:
  group: pr-status-check-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-status-check:
    # IMPORTANT: this job name is the status-check context surfaced to the
    # ruleset. It MUST match the ruleset's `required_status_checks` context
    # exactly. Renaming this changes the context and breaks the ruleset
    # match.
    name: PR Status Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Read the input once into an env var so all subsequent steps can
      # reference $REQUESTED_VERSION without re-interpolating untrusted-
      # ish input into the shell command line.
      REQUESTED_VERSION: ${{ inputs.cli-version || 'local' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install workspace (lockfile-strict)
        # Phase E uses the workspace's own build artifact rather than a
        # published tarball — the full integrity-verified `npm pack` flow
        # lands in Phase B-PUBLISH (per cycle doc § Reusable workflow
        # shapes). The 'local' branch is the only branch that exists
        # today; the pinned-version branch lands with publish.
        if: env.REQUESTED_VERSION == 'local'
        run: npm ci

      - name: Build workspace
        if: env.REQUESTED_VERSION == 'local'
        run: npm run build

      - name: Install @momentiq/dark-factory-cli (consumer path)
        # Phase B-PUBLISH-wf: consumer install path. Installs the pinned
        # CLI into an isolated $RUNNER_TEMP dir so the token never lands
        # in the consumer's checkout and the install can't be influenced
        # by the consumer's lockfile. `--ignore-scripts` blocks lifecycle
        # scripts. See header comment for the deferred-hardening note.
        if: env.REQUESTED_VERSION != 'local'
        env:
          NPM_TOKEN: ${{ secrets.MOMENTIQ_NPM_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::MOMENTIQ_NPM_READ_TOKEN secret required for the consumer install path (cli-version='$REQUESTED_VERSION')." >&2
            echo "::error::Pass it from your caller workflow's `secrets:` block. Becomes optional after the 331.3 OSS-flip." >&2
            exit 1
          fi
          # Job-scoped .npmrc under $RUNNER_TEMP — never the consumer's checkout.
          NPMRC="$(mktemp)"
          trap 'rm -f "$NPMRC"' EXIT
          chmod 600 "$NPMRC"
          printf '@momentiq:registry=https://registry.npmjs.org/\n//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$NPMRC"
          # Isolated install dir — NOT the caller's workspace (caller may
          # not be a workspaces monorepo, and the token must not touch
          # consumer files).
          INSTALL_DIR="$RUNNER_TEMP/df-cli"
          mkdir -p "$INSTALL_DIR"
          cd "$INSTALL_DIR"
          cat > package.json <<'EOF'
          {"name": "df-cli-runtime", "version": "0.0.0", "private": true}
          EOF
          npm install --userconfig "$NPMRC" --no-audit --no-fund --ignore-scripts \
            "@momentiq/dark-factory-cli@${REQUESTED_VERSION}"
          # dark-factory#11 / sage3c#2198 — re-run sqlite3's install script
          # ONLY (whitelist; not all scripts). See agent-critic.yml for
          # the full rationale; the rest of the dep tree stays under
          # --ignore-scripts.
          npm rebuild sqlite3 --userconfig "$NPMRC"
          # Surface the binary path for downstream steps.
          DF_CLI="$INSTALL_DIR/node_modules/.bin/df"
          if [ ! -x "$DF_CLI" ]; then
            echo "::error::Installed @momentiq/dark-factory-cli@$REQUESTED_VERSION but binary not found at $DF_CLI." >&2
            exit 1
          fi
          echo "DF_CLI=$DF_CLI" >> "$GITHUB_ENV"

      - name: Run status-check stub (local path)
        # Phase E aggregator stub — exits 0. See `df status-check --help`
        # for the no-op contract documented at packages/cli/src/cli.ts.
        if: env.REQUESTED_VERSION == 'local'
        run: node ./packages/cli/dist/cli.js status-check

      - name: Run status-check stub (consumer path)
        if: env.REQUESTED_VERSION != 'local'
        run: |
          set -euo pipefail
          "$DF_CLI" status-check

      - name: Summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          {
            echo "## PR Status Check Summary"
            echo ""
            if [[ "$JOB_STATUS" == "success" ]]; then
              echo "PR Status Check stub passed (Phase E no-op aggregator)."
            else
              echo "PR Status Check stub failed — investigate workspace install or build."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
