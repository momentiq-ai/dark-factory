# agent-critic — reusable workflow shape (cycle 331.1 Phases E + F).
#
# Satisfies the `agent-critic` required-status-check context in dark-
# factory's own main1 ruleset (id 16808560) and is published as a
# reusable workflow for consumers (sage3c / cerebe-platform / external
# repos) to invoke from their own CI in Phases G/H.
#
# Phase E shipped this workflow with `df critic` as a no-op stub so the
# 5 reusable workflows could break the chicken-and-egg (admin-merge
# was required for Phases A/B/C/D because dark-factory had no CI to
# satisfy its own ruleset). Phase F replaced the stub with the real
# Critic Orchestrator invocation — this workflow now runs the actual
# vendor adapters via `runReview()` against the PR's HEAD commit.
#
# Dual trigger:
#   1. `pull_request:` — runs on dark-factory's own PRs so the ruleset
#      is satisfied here (context = the JOB NAME below). Same-repo PRs
#      have access to repository secrets per GitHub Actions security
#      model.
#   2. `workflow_call:` — consumers `uses:` this from their own
#      workflows. Consumer caller-job-id is the first segment of the
#      resulting context; consumers MUST name their caller job
#      `agent-critic:` for the rule to match.
#
# Secrets surface (consumed by the Phase F real critic invocation):
#   - DOPPLER_SERVICE_TOKEN_SAGE: internal-momentiq path (sage3c /
#     cerebe-platform); fetches vendor critic keys via `doppler secrets
#     get` at runtime. See cycle 331.1 § Reusable workflow shapes.
#     Phase F does NOT yet implement Doppler-loading from this token;
#     a follow-up will add the `doppler run -- ...` wrapper to surface
#     keys to the CLI process. Until then, consumers wire vendor keys
#     directly via the 4 explicit env vars below.
#   - CURSOR_API_KEY / CODEX_API_KEY / GEMINI_API_KEY / XAI_API_KEY:
#     external-consumer path AND the dark-factory internal path until
#     the Doppler wrapper lands. The Phase F `df critic` step exports
#     each into the CLI subprocess; missing keys cause the corresponding
#     vendor adapter to register as `status=error` (non-blocking under
#     the min-complete-quorum aggregation policy).
#   - MOMENTIQ_NPM_READ_TOKEN: required for the consumer install path
#     (cli-version != 'local') during the 331.1/331.2 private-scope
#     window; becomes optional post-331.3 OSS-flip. Wired into the
#     `Install @momentiq/dark-factory-cli (consumer path)` step below.
#
# Phase B-PUBLISH-wf (cycle 331.1): consumer install path uses
# `npm install` inside an isolated $RUNNER_TEMP dir with a job-scoped
# `.npmrc`. See pr-status-check.yml header for the deferred-hardening
# note re: full integrity-baked `npm pack`.
#
# Security: all input values flow through env vars (REQUESTED_VERSION)
# before any run script references them, per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

name: Agent Critic

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_call:
    inputs:
      cli-version:
        description: |
          CLI version to install. 'local' (default) builds from the
          checked-out workspace. Consumers pass an explicit semver tag
          (e.g. '0.1.0-alpha.5') — see pr-status-check.yml for the same
          contract.
        type: string
        required: false
        default: 'local'
      darkfactory_config_path:
        description: |
          Path in the consumer repo to darkfactory.yaml. Forwarded as
          `--config` to the underlying `df critic` invocation when Phase F
          wires real critic orchestration; ignored by the Phase E stub.
        type: string
        required: false
        default: 'darkfactory.yaml'
    secrets:
      DOPPLER_SERVICE_TOKEN_SAGE:
        description: |
          Internal-momentiq path: fetches MOMENTIQ_NPM_READ_TOKEN and
          vendor critic keys via Doppler at runtime. Not read by the
          Phase E stub; declared here so Phase F can pick it up without
          a contract change.
        required: false
      MOMENTIQ_NPM_READ_TOKEN:
        description: |
          Read-token for the @momentiq npm scope (private 331.1/331.2
          window). Becomes optional post-331.3 OSS-flip.
        required: false
      CURSOR_API_KEY:
        description: |
          Vendor critic key — external-consumer path. Required UNLESS
          DOPPLER_SERVICE_TOKEN_SAGE is provided.
        required: false
      CODEX_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      XAI_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: agent-critic-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  agent-critic:
    # IMPORTANT: this job name is the status-check context surfaced to
    # the ruleset. Must match `required_status_checks.context:
    # agent-critic` exactly.
    name: agent-critic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REQUESTED_VERSION: ${{ inputs.cli-version || 'local' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install workspace (lockfile-strict)
        if: env.REQUESTED_VERSION == 'local'
        run: npm ci

      - name: Build workspace
        if: env.REQUESTED_VERSION == 'local'
        run: npm run build

      - name: Install @momentiq/dark-factory-cli (consumer path)
        # Phase B-PUBLISH-wf consumer install — same pattern as
        # pr-status-check.yml. See that file's header for the deferred-
        # hardening note re: full integrity-baked `npm pack`.
        if: env.REQUESTED_VERSION != 'local'
        env:
          NPM_TOKEN: ${{ secrets.MOMENTIQ_NPM_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::MOMENTIQ_NPM_READ_TOKEN secret required for the consumer install path (cli-version='$REQUESTED_VERSION')." >&2
            exit 1
          fi
          NPMRC="$(mktemp)"
          trap 'rm -f "$NPMRC"' EXIT
          chmod 600 "$NPMRC"
          printf '@momentiq:registry=https://registry.npmjs.org/\n//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$NPMRC"
          INSTALL_DIR="$RUNNER_TEMP/df-cli"
          mkdir -p "$INSTALL_DIR"
          cd "$INSTALL_DIR"
          cat > package.json <<'EOF'
          {"name": "df-cli-runtime", "version": "0.0.0", "private": true}
          EOF
          npm install --userconfig "$NPMRC" --no-audit --no-fund --ignore-scripts \
            "@momentiq/dark-factory-cli@${REQUESTED_VERSION}"
          # dark-factory#11 / sage3c#2198 — re-run sqlite3's install script
          # ONLY (whitelist; not all scripts). sqlite3 ships prebuilt
          # binaries via node-pre-gyp; `npm rebuild sqlite3` fetches the
          # prebuilt for the runner arch without compiling. The rest of
          # the dep tree remains under --ignore-scripts; only sqlite3's
          # lifecycle is unsealed, narrowing the supply-chain surface to
          # a single known package. Without this, the Cursor adapter
          # fails to register on the consumer path because @cursor/sdk
          # → sqlite3 can't locate its native binding (observed on
          # taxpilot2a PR #47, alpha.6).
          npm rebuild sqlite3 --userconfig "$NPMRC"
          DF_CLI="$INSTALL_DIR/node_modules/.bin/df"
          if [ ! -x "$DF_CLI" ]; then
            echo "::error::Installed @momentiq/dark-factory-cli@$REQUESTED_VERSION but binary not found at $DF_CLI." >&2
            exit 1
          fi
          echo "DF_CLI=$DF_CLI" >> "$GITHUB_ENV"

      - name: Run real Critic Orchestrator (local path)
        # Phase F posture: `df critic` invokes the real Critic Orchestrator
        # (extracted in Phase B) via `runReview()`. Loads
        # `.agent-review/config.json`, instantiates the 4 vendor adapters,
        # runs them concurrently, writes the aggregate verdict to
        # `.git/agent-reviews/<sha>.json`, and persists telemetry to
        # `_runs.ndjson`. Exits 0 even on errors (degrade-and-pass) — the
        # configured min-complete-quorum policy with `required: false` on
        # every critic handles per-critic failures gracefully (errored
        # critics contribute to `quorum_unmet`, which is non-blocking).
        if: env.REQUESTED_VERSION == 'local'
        env:
          # Wire vendor API keys from workflow secrets into the CLI
          # process. Mirror the keys the adapters read by convention
          # (CURSOR_API_KEY / CODEX_API_KEY / GEMINI_API_KEY / XAI_API_KEY).
          # Missing keys produce per-critic errors, not pipeline failures.
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: node ./packages/cli/dist/cli.js critic

      - name: Run real Critic Orchestrator (consumer path)
        # Consumer path: invoke the installed CLI binary. The CLI reads
        # `.agent-review/config.json` from the consumer's checkout (cwd)
        # and writes artifacts to `.git/agent-reviews/<sha>.json` there.
        if: env.REQUESTED_VERSION != 'local'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          set -euo pipefail
          "$DF_CLI" critic

      - name: Summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          {
            echo "## agent-critic Summary"
            echo ""
            if [[ "$JOB_STATUS" == "success" ]]; then
              echo "agent-critic ran the real Critic Orchestrator (Phase F)."
              echo "See the 'Run real Critic Orchestrator' step above for per-critic"
              echo "verdicts and the .git/agent-reviews/<sha>.json artifact path."
            else
              echo "agent-critic failed — investigate workspace install or build."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
