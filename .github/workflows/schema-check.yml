# schema-check — reusable workflow shape (cycle 331.1 Phase E).
#
# This satisfies the `schema-check` required-status-check context in
# dark-factory's own main1 ruleset (id 16808560) and is published as a
# reusable workflow for consumers (sage3c / cerebe-platform / external
# repos) to invoke from their own CI in Phases G/H.
#
# Dark-factory itself has no schemas to drift against — `@momentiq/dark-
# factory-schemas` is the SOURCE of schemas, and its `npm run build`
# already type-checks the package as part of `npm run build --workspaces`
# (run in this same job via the install step below). So on dark-factory's
# own PRs this is effectively a "schemas package built cleanly" smoke
# test, not a drift check.
#
# Sage3c's own `schema-check.yml` (which compares the committed
# `web/types/api/openapi.json` to a freshly-exported one) is preserved
# as-is during Phase G — sage3c keeps using its existing implementation
# rather than `uses:`-ing this reusable shape, because the OpenAPI drift
# logic is sage3c-specific. The dark-factory reusable shape exists to
# satisfy dark-factory's own ruleset, not to subsume sage3c's drift gate.
#
# Dual trigger:
#   1. `pull_request:` — runs on dark-factory's own PRs so the ruleset
#      is satisfied here (context = the JOB NAME below).
#   2. `workflow_call:` — consumers invoke this from their own workflows;
#      consumer caller-job-id is the first segment of the resulting
#      context, so consumers MUST name their caller job `schema-check:`
#      for the rule to match.
#
# Phase B-PUBLISH-wf (cycle 331.1): the `cli-version != 'local'` branch
# below installs the pinned CLI from npm under @momentiq scope using a
# job-scoped `.npmrc` (mktemp + trap + chmod 600, written to
# $RUNNER_TEMP). See pr-status-check.yml header for the same pattern
# and the deferred-hardening note re: full integrity-baked `npm pack`.
#
# Security: input passes through env var (REQUESTED_VERSION) before any
# run script references it, per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

name: Schema Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_call:
    inputs:
      cli-version:
        description: |
          CLI version to install. 'local' (default) builds from the
          checked-out workspace. Consumers pass an explicit semver tag
          (e.g. '0.1.0-alpha.5') — see pr-status-check.yml for the same
          contract.
        type: string
        required: false
        default: 'local'
    secrets:
      MOMENTIQ_NPM_READ_TOKEN:
        description: |
          Read-token for the @momentiq npm scope. Required when
          `cli-version` != 'local'. Becomes optional post-331.3.
        required: false

permissions:
  contents: read

concurrency:
  group: schema-check-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  schema-check:
    # IMPORTANT: this job name is the status-check context surfaced to
    # the ruleset. Must match `required_status_checks.context: schema-check`
    # exactly.
    name: schema-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      REQUESTED_VERSION: ${{ inputs.cli-version || 'local' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install workspace (lockfile-strict)
        if: env.REQUESTED_VERSION == 'local'
        run: npm ci

      - name: Build workspace (including schemas package)
        # `@momentiq/dark-factory-schemas` is built here. If a future PR
        # introduces a schema-drift detector (e.g. cycle 331.3 OSS-flip
        # might ship a JSON Schema -> consumer-config validator), wire
        # it into a follow-up step below.
        if: env.REQUESTED_VERSION == 'local'
        run: npm run build

      - name: Install @momentiq/dark-factory-cli (consumer path)
        # Phase B-PUBLISH-wf consumer install — same pattern as
        # pr-status-check.yml. See that file's header for the deferred-
        # hardening note re: full integrity-baked `npm pack`.
        if: env.REQUESTED_VERSION != 'local'
        env:
          NPM_TOKEN: ${{ secrets.MOMENTIQ_NPM_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::MOMENTIQ_NPM_READ_TOKEN secret required for the consumer install path (cli-version='$REQUESTED_VERSION')." >&2
            exit 1
          fi
          NPMRC="$(mktemp)"
          trap 'rm -f "$NPMRC"' EXIT
          chmod 600 "$NPMRC"
          printf '@momentiq:registry=https://registry.npmjs.org/\n//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$NPMRC"
          INSTALL_DIR="$RUNNER_TEMP/df-cli"
          mkdir -p "$INSTALL_DIR"
          cd "$INSTALL_DIR"
          cat > package.json <<'EOF'
          {"name": "df-cli-runtime", "version": "0.0.0", "private": true}
          EOF
          npm install --userconfig "$NPMRC" --no-audit --no-fund --ignore-scripts \
            "@momentiq/dark-factory-cli@${REQUESTED_VERSION}"
          # dark-factory#11 + sage3c#2198 — rebuild sqlite3 prebuilt only.
          # See agent-critic.yml for the full rationale; whitelist scope.
          npm rebuild sqlite3 --userconfig "$NPMRC"
          DF_CLI="$INSTALL_DIR/node_modules/.bin/df"
          if [ ! -x "$DF_CLI" ]; then
            echo "::error::Installed @momentiq/dark-factory-cli@$REQUESTED_VERSION but binary not found at $DF_CLI." >&2
            exit 1
          fi
          echo "DF_CLI=$DF_CLI" >> "$GITHUB_ENV"

      - name: schema-check stub (Phase E, local path)
        # Dark-factory has no schemas to drift-check today. Future work:
        # validate `darkfactory.yaml` consumer configs against the published
        # JSON Schema once that lands (cycle 331.3 OSS-flip).
        if: env.REQUESTED_VERSION == 'local'
        run: |
          set -euo pipefail
          echo "schema-check: no-op stub (Phase E) — schemas package built cleanly above."

      - name: schema-check stub (consumer path)
        # The CLI install itself is the smoke-test for consumers — if the
        # CLI is installable from npm, the schemas package (its transitive
        # dependency) is reachable. No `df schema-check` subcommand exists
        # today; the consumer-path equivalent is just verifying the install
        # was successful (which the install step above already does).
        # Future: invoke a `df validate-config darkfactory.yaml` subcommand
        # post 331.3 when the consumer-config validator ships.
        if: env.REQUESTED_VERSION != 'local'
        run: |
          set -euo pipefail
          echo "schema-check: consumer path — CLI installed and binary present at $DF_CLI."
          "$DF_CLI" --version

      - name: Summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          {
            echo "## schema-check Summary"
            echo ""
            if [[ "$JOB_STATUS" == "success" ]]; then
              echo "schema-check stub passed (Phase E — schemas package built; no drift detector wired yet)."
            else
              echo "schema-check stub failed — investigate workspace build."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
